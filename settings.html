<div class="inline-drawer">
  <div class="inline-drawer-toggle inline-drawer-header">
    <b>Memory Bridge</b>
    <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
  </div>
  <div class="inline-drawer-content">
    <div id="memory-bridge-settings">

      <!-- 连接配置 -->
      <div class="mb-section">
        <div class="mb-section-title">MCP 服务连接</div>

        <div class="mb-row">
          <label for="mb-connection-mode">连接模式</label>
          <select id="mb-connection-mode">
            <option value="http">HTTP 地址</option>
            <option value="json">MCP JSON</option>
          </select>
        </div>

        <div id="mb-http-config">
          <div class="mb-row">
            <label for="mb-server-url">服务地址</label>
            <input type="text" id="mb-server-url" placeholder="http://localhost:8000/mcp" />
          </div>

          <div class="mb-row">
            <label for="mb-token">Bearer Token</label>
            <input type="password" id="mb-token" placeholder="留空则不鉴权" />
          </div>
        </div>

        <div id="mb-json-config" class="mb-hidden">
          <div class="mb-row">
            <label for="mb-selected-server-name">Server 名称</label>
            <input type="text" id="mb-selected-server-name" placeholder="留空默认取第一个 mcpServers 项" />
          </div>
          <div class="mb-row mb-row-top">
            <label for="mb-mcp-config-json">MCP JSON</label>
            <textarea id="mb-mcp-config-json" placeholder='{
  "mcpServers": {
    "mcp-router": {
      "command": "npx",
      "args": ["-y", "@mcp_router/cli@latest", "connect"],
      "env": {
        "MCPR_TOKEN": ""
      }
    }
  }
}'></textarea>
          </div>
          <div class="mb-hint">支持标准 `mcpServers` 结构；当前可直接连接 `url` 配置，`command` 配置会先做解析与提示。</div>
        </div>

        <div class="mb-status-row">
          <div id="mb-status-dot" class="disconnected"></div>
          <span id="mb-status-text">未连接</span>
          <button class="mb-btn primary" id="mb-btn-connect">连接测试</button>
        </div>
      </div>

      <!-- 召回配置 -->
      <div class="mb-section">
        <div class="mb-section-title">记忆召回</div>

        <div class="mb-toggle-row">
          <input type="checkbox" id="mb-enabled" />
          <label for="mb-enabled">启用记忆注入</label>
        </div>

        <div class="mb-row">
          <label for="mb-recall-limit">召回数量</label>
          <input type="number" id="mb-recall-limit" min="1" max="20" value="5" style="max-width:70px;" />
        </div>

        <div class="mb-row">
          <label for="mb-domain">搜索域</label>
          <input type="text" id="mb-domain" placeholder="留空搜索全部域" />
        </div>

        <div class="mb-row">
          <label for="mb-inject-tag">注入标签</label>
          <input type="text" id="mb-inject-tag" placeholder="[记忆参考]" />
        </div>
        <div class="mb-hint">记忆内容将包裹在此标签内注入，留空则直接追加</div>
      </div>

      <!-- 启动记忆 -->
      <div class="mb-section">
        <div class="mb-section-title">启动记忆（Boot Memory）</div>

        <div class="mb-toggle-row">
          <input type="checkbox" id="mb-boot-enabled" />
          <label for="mb-boot-enabled">切换聊天时加载核心记忆</label>
        </div>

        <div class="mb-row">
          <label for="mb-boot-uri">Boot URI</label>
          <input type="text" id="mb-boot-uri" placeholder="system://boot" />
        </div>
        <div class="mb-hint">加载后注入为系统提示词（不修改聊天记录）</div>
      </div>

      <!-- 调试 -->
      <div class="mb-section">
        <div class="mb-section-title">调试</div>

        <div class="mb-toggle-row">
          <input type="checkbox" id="mb-debug" />
          <label for="mb-debug">控制台调试日志</label>
        </div>

        <div class="mb-btn-row">
          <button class="mb-btn" id="mb-btn-test-recall">测试召回（当前输入框）</button>
          <button class="mb-btn" id="mb-btn-clear-session">清除会话</button>
        </div>

        <div class="mb-section-title" style="margin-top:8px;">上次注入预览</div>
        <div class="mb-inject-preview empty" id="mb-last-inject">（尚未注入）</div>
      </div>

    </div>
  </div>
</div>
